<head>

    <!-- Open Graph / social previews -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="preflight.xml" />
    <meta property="og:description"
        content="Visual builder for Windows autounattend.xml - in your browser, offline, instantly." />
    <meta property="og:url" content="https://kyarick.github.io/preflight.xml/" />
    <meta property="og:image"
        content="https://raw.githubusercontent.com/kYaRick/preflight.xml/main/.github/assets/social-card.svg" />
    <meta property="og:image:width" content="1200" />

    <meta property="og:locale" content="en_US" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="preflight.xml" />
    <meta name="twitter:description"
        content="Visual builder for Windows autounattend.xml - in your browser, offline, instantly." />
    <meta name="twitter:image"
        content="https://raw.githubusercontent.com/kYaRick/preflight.xml/main/.github/assets/social-card.svg" />

    <script type="importmap"></script>

    <!-- Syntax highlighter for the Advanced XML preview AND the in-page CodeEditor
         (Policy XML / start pins JSON / diskpart / custom scripts). Core + markup
         ships in prism.min.js; the extras below cover the script/config surfaces.
         `defer` on all of them so they execute in order after the DOM is parsed.
         Token colours are overridden by css/app.css against the pf-* palette. -->
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-json.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-batch.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-powershell.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-ini.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-basic.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-vbnet.min.js" defer></script>

    <!-- Theme + culture + keyboard helpers (must load before first paint). -->
    <script src="js/theme.js"></script>
    <script src="js/culture.js"></script>
    <script src="js/keyboard.js"></script>
    <script src="js/files.js"></script>
    <script src="js/scroll.js"></script>
    <script src="js/prism-helper.js"></script>
    <script src="js/view-transitions.js"></script>

    <!-- Apply persisted theme to <html> BEFORE CSS paints, so the loading
         screen matches the user's choice even before Blazor boots. -->
    <script>
        window.preflightTheme.apply(window.preflightTheme.get());

        // Restore SPA route from "#__r=" hash. The desktop shell encodes the
        // original path here when redirecting unknown routes (/wizard,
        // /docs, ...) to /index.html - see Preflight.Desktop.MainWindow's
        // OnNavigationStarting. Doing this BEFORE the /index.html → / strip
        // means a single replaceState lands the canonical route before
        // Blazor's router reads location.
        var __pfRestorePrefix = '#__r=';
        if (location.hash.indexOf(__pfRestorePrefix) === 0) {
            try {
                var __pfTarget = decodeURIComponent(
                    location.hash.slice(__pfRestorePrefix.length));
                history.replaceState(null, '', __pfTarget);
            } catch (e) { /* malformed hash - ignore */ }
        }

        // Normalize "<base>/index.html" → "<base>/" so Blazor's router sees the
        // canonical landing route. Required for desktop hosts (WebView2)
        // because SetVirtualHostNameToFolderMapping has no directory-index
        // behavior - the only way in is to navigate explicitly to the file -
        // and Blazor would otherwise resolve "/index.html" against base="/"
        // and fall through to <NotFound>. Harmless on the web (GitHub Pages
        // already serves index.html as the directory default).
        if (location.pathname.endsWith('/index.html')) {
            history.replaceState(null, '',
                location.pathname.slice(0, -'index.html'.length)
                + location.search + location.hash);
        }
    </script>
</head>

<body>
    <!-- Loading overlay lives OUTSIDE #app so Blazor's mount doesn't tear
         it down mid-animation. It stays on top of the freshly-rendered
         app until BOTH conditions are met:
           1. Blazor has actually mounted (.layout exists)
           2. A minimum display window has elapsed (so the plane always
              gets to complete one full flight cycle even on cache hits). -->
    <div id="loading-overlay" aria-label="Loading preflight.xml">
        <div class="preflight-loader">
            <svg class="runway-wave" width="400" height="60" viewBox="0 0 400 60" aria-hidden="true">
                <defs>
                    <linearGradient id="runwayGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#6d28d9" />
                        <stop offset="100%" stop-color="#a855f7" />
                    </linearGradient>
                    <linearGradient id="planeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#a855f7" />
                        <stop offset="100%" stop-color="#6d28d9" />
                    </linearGradient>
                </defs>
                <path class="runway-track" d="M 0 30 Q 50 5, 100 30 T 200 30 T 300 30 T 400 30" />
                <path class="runway-trail" d="M 0 30 Q 50 5, 100 30 T 200 30 T 300 30 T 400 30" />
            </svg>
            <!-- Inline SVG airplane, gradient-filled. Always visible, no
                 background-clip:text quirks across browsers/themes. -->
            <svg class="plane" viewBox="0 0 24 24" aria-hidden="true">
                <path fill="url(#planeGradient)"
                    d="M21 16v-2l-8-5V3.5A1.5 1.5 0 0 0 11.5 2A1.5 1.5 0 0 0 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1l3.5 1v-1.5L13 19v-5.5z" />
            </svg>
            <div class="runway-status"></div>
        </div>
    </div>

    <div id="app"></div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>

    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script>
        // Preflight.Desktop tags its WebView2 user agent so the page can tell
        // it's running inside the WPF shell. We skip service worker registration
        // there - the desktop has direct file access and doesn't need offline
        // caching, and a stale SW from an older build was occasionally serving
        // a cached index.html that lacked the /index.html → / URL normalizer,
        // sending Blazor through to <NotFound> on intermittent cold starts.
        const PF_IS_DESKTOP = navigator.userAgent.includes('Preflight-Desktop');
        if (PF_IS_DESKTOP && navigator.serviceWorker) {
            navigator.serviceWorker.getRegistrations().then(regs => {
                regs.forEach(r => r.unregister());
            }).catch(() => { /* best-effort cleanup */ });
        } else if (navigator.serviceWorker) {
            navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' });
        }

        // Loader-dismiss policy:
        //   • Normal first visit: keep the loader for at least MIN_DISPLAY_MS
        //     so the runway shimmer reads as a deliberate beat, not a flicker.
        //   • Deep-link 404: GH Pages serves 404.html (= index.html), Blazor
        //     boots, the router resolves NoMatch and renders <NotFound>.
        //     Holding the loader 2.4s on top of a destination the user can't
        //     reach is hostile - fade as soon as Blazor has mounted.
        //   • Desktop host: post `preflight:ready` to the WPF shell as the
        //     overlay starts fading, so its splash window cross-fades to the
        //     main window in sync with the in-page overlay (no double-loading
        //     visual, no flash of empty chrome).
        //
        // Uses setInterval (not rAF) so the check fires even if the tab is
        // temporarily hidden - otherwise the overlay could stay up forever.
        (() => {
            const overlay = document.getElementById('loading-overlay');
            if (!overlay) return;
            // Desktop shell already shows its own splash with the same
            // bobbing airplane, so the in-page airplane-runway overlay is
            // a redundant second loader. Drop the minimum display window
            // so it dismisses the moment Blazor mounts - no artificial
            // 2.4s wait stacked on top of the splash.
            const MIN_DISPLAY_MS = PF_IS_DESKTOP ? 0 : 2400;
            const started = Date.now();
            const html = document.documentElement;

            const notifyHost = () => {
                try { window.chrome?.webview?.postMessage('preflight:ready'); }
                catch { /* not in WebView2 - ignore */ }
            };

            // Bridge Blazor's "47%" string → unitless 47 in --pf-trail-progress.
            // Also pin --pf-trail-length-px to the path's actual computed length
            // (~416 user units for the wave curve). The trail dash-array uses
            // absolute pixels rather than relying on SVG `pathLength` scaling,
            // because Chromium / WebView2 does NOT apply pathLength to length-
            // typed dash values that were computed via CSS calc() / var() - it
            // treats them as raw px. With dasharray "30px 100px" on a 416px
            // path the pattern WAS repeating (drawn at 0-30, 130-160, 260-290,
            // 390-416), which is exactly the "line ahead of the plane" the
            // user reported. Computing dasharray from the real path length
            // sidesteps the issue entirely.
            //
            // Observation-driven, not polled: a MutationObserver watches <html>'s
            // style attribute and mirrors --blazor-load-percentage to
            // --pf-trail-progress in the SAME frame Blazor writes it. Polling at
            // 120ms (the previous approach) made the plane and trail start their
            // CSS transitions out of phase.
            const trailPath = document.querySelector('.runway-trail');
            if (trailPath) {
                try {
                    const len = trailPath.getTotalLength();
                    if (len > 0) html.style.setProperty('--pf-trail-length-px', `${len}px`);
                } catch { /* getTotalLength can throw on detached / pre-layout SVG */ }
            }
            let _lastTrailProgress = null;
            const syncTrail = () => {
                const raw = html.style.getPropertyValue('--blazor-load-percentage')
                    || getComputedStyle(html).getPropertyValue('--blazor-load-percentage');
                if (!raw) return;
                const num = parseFloat(raw);
                if (Number.isNaN(num)) return;
                const next = String(num);
                if (next === _lastTrailProgress) return;
                _lastTrailProgress = next;
                html.style.setProperty('--pf-trail-progress', next);
            };
            syncTrail();
            const trailObserver = new MutationObserver(syncTrail);
            trailObserver.observe(html, { attributes: true, attributeFilter: ['style'] });

            const handle = setInterval(() => {
                const blazorReady = !!document.querySelector('.layout');
                const isNotFound = !!document.querySelector('.pf-404');
                const minElapsed = Date.now() - started >= MIN_DISPLAY_MS;
                if (blazorReady && (minElapsed || isNotFound)) {
                    clearInterval(handle);
                    trailObserver.disconnect();
                    // Pin trail at 100% before fade-out so the runway lands on
                    // the right-hand crest instead of freezing mid-flight.
                    html.style.setProperty('--pf-trail-progress', '100');
                    overlay.classList.add('is-done');
                    // Trigger the first page-enter animation AFTER the loader
                    // starts fading. Without this, the page-enter would run
                    // silently underneath the loader and be invisible.
                    window.preflightNav?.replayPageAnim?.();
                    notifyHost();
                    setTimeout(() => overlay.remove(), 500);
                }
            }, 120);
        })();
    </script>
</body>

</html>
