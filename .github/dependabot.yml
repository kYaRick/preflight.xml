version: 2
updates:
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Kyiv
    open-pull-requests-limit: 1
    groups:
      nuget-all:
        patterns:
          - "*"
    labels:
      - "🧹 chore"
      - "📦 dependencies"
    commit-message:
      prefix: "chore(deps)"
      include: scope

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Kyiv
    open-pull-requests-limit: 1
    groups:
      github-actions-all:
        patterns:
          - "*"
    labels:
      - "🧹 chore"
      - "🤖 ci"
    commit-message:
      prefix: "ci(deps)"
      include: scope
