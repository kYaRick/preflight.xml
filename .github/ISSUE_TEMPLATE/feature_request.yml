name: ✨ Feature Request
description: Suggest a new feature or improvement
title: "feat: <short summary>"
labels: ["✨ enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! 💡
        Please be concrete - describe the problem, then the proposed solution.

  - type: checkboxes
    id: preflight
    attributes:
      label: ✅ Preflight checks
      options:
        - label: I searched existing issues and discussions for this idea
          required: true

  - type: textarea
    id: problem
    attributes:
      label: 🤔 Problem / motivation
      description: What problem does this feature solve?
      placeholder: "Right now I have to manually edit XML because …"
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 💡 Proposed solution
      description: Describe the feature and how it should behave.
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: 👥 Who benefits?
      description: Target audience / use case - sysadmin, homelabber, enterprise, etc.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 🔀 Alternatives considered
      description: Other approaches you thought about and why they fall short.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: 📎 Additional context
      description: Mockups, links, screenshots - anything useful.
    validations:
      required: false
